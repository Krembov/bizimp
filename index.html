<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Бизнес Империя</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0d18;--surface:#16162a;--border:rgba(255,255,255,0.06);--text:#dfe6e9;--dim:#636e72;--accent:#6c5ce7;--green:#00b894;--red:#e17055;--gold:#fdcb6e;--r:10px}
.theme-light{--bg:#f0f2f5;--surface:#fff;--border:rgba(0,0,0,0.08);--text:#2d3436;--dim:#b2bec3}
body{background:var(--bg);color:var(--text);font-family:-apple-system,sans-serif;min-height:100vh;overflow-x:hidden;transition:.2s}
#app{max-width:760px;margin:0 auto;padding:10px}
.hdr{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.hdr .t{font-size:18px;font-weight:700;background:linear-gradient(135deg,var(--accent),#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .m{font-size:17px;font-weight:700;color:var(--gold);margin-left:auto}
.hdr-r{display:flex;align-items:center;gap:4px}
.ibtn{width:32px;height:32px;border-radius:7px;border:none;background:var(--surface);color:var(--dim);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center}
.ibtn:hover{background:rgba(255,255,255,0.05)}
.ibtn.act{background:var(--accent);color:#fff}
.tabs{display:flex;gap:3px;margin-bottom:8px;overflow-x:auto}
.tab{padding:6px 11px;border-radius:7px;border:none;background:var(--surface);color:var(--dim);cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap}
.tab.act{background:var(--accent);color:#fff}
.tab .b{background:var(--red);color:#fff;border-radius:50%;padding:0 5px;font-size:9px;margin-left:3px}
.c{background:var(--surface);border-radius:var(--r);padding:12px;margin-bottom:7px;border:1px solid var(--border)}
.c h3{font-size:13px;margin-bottom:5px;color:#a29bfe}
.r{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px}
.r+.r{border-top:1px solid var(--border)}
.l{color:var(--dim)}.v{font-weight:600}
.btn{padding:6px 12px;border-radius:7px;border:none;cursor:pointer;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.bp{background:var(--accent);color:#fff}.bp:hover{opacity:.9}
.bg{background:var(--green);color:#fff}
.br{background:var(--red);color:#fff}
.bo{background:transparent;border:1px solid var(--border);color:var(--text)}
.bs{padding:4px 8px;font-size:11px}
.btn:disabled{opacity:.25;cursor:default}
.pb{height:5px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;margin:3px 0}
.pf{height:100%;border-radius:4px;transition:width .3s}
.ev{padding:7px 10px;border-radius:7px;margin-bottom:5px;font-size:12px;display:flex;align-items:center;gap:7px;animation:si .25s}
.ev-g{background:rgba(0,184,148,0.1);border-left:3px solid var(--green)}
.ev-b{background:rgba(225,112,85,0.1);border-left:3px solid var(--red)}
.ev-i{background:rgba(108,92,231,0.1);border-left:3px solid var(--accent)}
@keyframes si{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.ss{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;text-align:center;gap:14px}
.ss h1{font-size:28px;background:linear-gradient(135deg,var(--accent),var(--gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.ss p{color:var(--dim);max-width:360px;line-height:1.5;font-size:13px}
.bg2{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:7px;width:100%;max-width:460px}
.bc{background:var(--surface);border-radius:var(--r);padding:12px;cursor:pointer;border:2px solid transparent;text-align:center}
.bc:hover{border-color:var(--accent);transform:translateY(-2px)}
.bc .ic{font-size:26px;margin-bottom:3px}.bc .nm{font-weight:600;font-size:13px}.bc .ds{font-size:11px;color:var(--dim);margin-top:2px}
.g2{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:5px}
.ic{background:rgba(255,255,255,0.04);border-radius:7px;padding:9px;font-size:12px}
.ic .nm{font-weight:600;font-size:13px;margin-bottom:2px}
.ic .st{color:var(--dim);font-size:11px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:50;animation:fi .2s}
@keyframes fi{from{opacity:0}to{opacity:1}}
.mc{background:var(--surface);border-radius:var(--r);padding:18px;max-width:320px;width:90%}
.mc h2{font-size:15px;margin-bottom:10px}
.sr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;font-size:13px}
.sr+.sr{border-top:1px solid var(--border)}
.tg{width:42px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;background:var(--dim)}
.tg.on{background:var(--accent)}
.tg::after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.2s}
.tg.on::after{left:22px}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:9px 14px;font-size:13px;z-index:100;animation:sd .25s}
@keyframes sd{from{opacity:0;transform:translateX(-50%) translateY(-14px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.to{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:40;display:flex;align-items:center;justify-content:center;animation:fi .3s}
.tb{background:var(--surface);border-radius:var(--r);padding:22px;max-width:380px;width:90%;text-align:center}
.tb h2{font-size:17px;margin-bottom:5px}.tb p{font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:8px}
.tb .st{display:flex;gap:7px;align-items:center;justify-content:center;margin:8px 0}
.tb .st .dt{width:7px;height:7px;border-radius:50%;background:var(--dim)}
.tb .st .dt.act{background:var(--accent);width:9px;height:9px}
@media(max-width:500px){#app{padding:5px}.hdr .t{font-size:15px}.hdr .m{font-size:13px}}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:4px}
</style>
</head>
<body><div id="app"></div><script>
const B={t:{n:'IT-Стартап',i:'💻',d:'Разработка',s:5000,r:50,c:120},r:{n:'Ресторан',i:'🍔',d:'Фастфуд',s:8000,r:40,c:80},f:{n:'Завод',i:'🏭',d:'Производство',s:12000,r:35,c:100},e:{n:'Магазин',i:'🛒',d:'Розница',s:6000,r:30,c:60}},E={t:['Антон','Катя','Максим','Ольга','Илья','Арина'],r:['Шеф','Мария','Сергей','Анна','Повар','Админ'],f:['Токарь','Сварщик','Инженер','Кладовщик','Логист','Техник'],e:['Продавец','Кассир','Админ','Консультант','Кладовщик']},S=['execution','creation','charisma','logic'],SN={execution:'Работа',creation:'Идеи',charisma:'Люди',logic:'Анализ'},U=[
{id:'o',n:'Офис',c:3000,e:'+2 места',f:()=>g.mxE+=2,i:'🏢',m:1.5},{id:'e',n:'Оборуд',c:4000,e:'+20% кач',f:()=>g.qb+=0.2,i:'🔧',m:1.6},{id:'m',n:'Маркетинг',c:2000,e:'+15% дох',f:()=>g.ib+=0.15,i:'📢',m:1.7},{id:'a',n:'Автоматиз',c:5000,e:'-10% расх',f:()=>g.cr+=0.1,i:'🤖',m:1.8},{id:'p',n:'PR',c:6000,e:'+1 реп/д',f:()=>g.rd+=1,i:'✨',m:1.5},{id:'l',n:'Логистика',c:3500,e:'+2 прод',f:()=>g.mxP+=2,i:'📦',m:1.6},{id:'t',n:'Тренинг',c:2500,e:'+1 навык',f:()=>g.tb+=1,i:'📚',m:1.5},{id:'i',n:'Инвестиции',c:8000,e:'пассив',f:()=>g.pr+=0.05,i:'🏦',m:1.7}],
EV=[{t:'💰 Крупный клиент!',g:1,f:g=>{g.m+=g.dp*3;ae('Крупный клиент +'+F(g.dp*3),1)}},{t:'📉 Кризис',g:0,f:g=>{g.m=Math.max(0,g.m-g.dp);ae('Кризис -'+F(g.dp),0)}},{t:'⭐ Хайп',g:1,f:g=>{g.rp+=2;ae('Хайп! реп +2',1)}},{t:'🔧 Поломка',g:0,f:g=>{g.m=Math.max(0,g.m-2500);ae('Поломка -2500',0)}},{t:'🏛️ Господдержка',g:1,f:g=>{g.m+=5000;ae('Господдержка +5000',1)}},{t:'📋 Налоговая',g:0,f:g=>{g.m=Math.max(0,g.m-3000);ae('Налоговая -3000',0)}},{t:'🎤 Интервью',g:1,f:g=>{g.rp+=3;ae('Интервью! реп +3',1)}},{t:'💀 Кибератака',g:0,f:g=>{g.m=Math.max(0,g.m-3500);g.rp=Math.max(0,g.rp-1);ae('Кибератака -3500',0)}},{t:'🤝 Партнёрство',g:1,f:g=>{g.m+=g.dp*2;ae('Партнёрство +'+F(g.dp*2),1)}},{t:'⚡ Авария',g:0,f:g=>{g.m=Math.max(0,g.m-2000);ae('Авария -2000',0)}}],
ACH=[{id:'fp',n:'Первая прибыль',d:'Получить прибыль',c:()=>g.tp>0,i:'💵'},{id:'e10',n:'Кадры',d:'10 сотрудников',c:()=>g.th>=10,i:'👥'},{id:'mil',n:'Миллионер',d:'1,000,000',c:()=>g.m>=1e6,i:'💰'},{id:'r50',n:'Известность',d:'Репутация 50',c:()=>g.rp>=50,i:'⭐'},{id:'au',n:'Империя',d:'Все улучшения',c:()=>U.every(u=>g.up[u.id]),i:'👑'},{id:'p5',n:'Ассортимент',d:'5 продуктов',c:()=>g.tpr>=5,i:'📦'},{id:'d100',n:'Стойкий',d:'100 дней',c:()=>g.d>=100,i:'⏰'}];
let g,st={snd:1,thm:'dark'},tab='ov',ss=0,stut=!localStorage.getItem('td'),sp=1,tmr=null,dp=0;
const F=n=>Math.floor(n).toLocaleString('ru-RU'),R=(a,b)=>Math.random()*(b-a)+a,RI=(a,b)=>Math.floor(R(a,b+1)),P=a=>a[Math.floor(Math.random()*a.length)];
function IG(t){let b=B[t];g={ph:'play',tp:t,d:1,m:b.s,lo:0,rp:0,em:[],pr:[],up:{},mxE:3,mxP:3,ib:0,cr:0,qb:0,rd:0,tb:0,pr:0,dp:0,tp:0,th:0,tpr:0,ev:[],ach:[]};tab='ov';ae('🚀 '+B[t].n+' открыт!',1);toast('🚀 Запущено!');startTimer();Rr()}
function ae(t,g){g.ev.unshift({t,g,id:Date.now()});if(g.ev.length>15)g.ev.pop()}
function toast(m){let e=document.createElement('div');e.className='toast';e.textContent=m;document.body.appendChild(e);setTimeout(()=>e.remove(),2000)}
function cA(){for(let a of ACH)if(!g.ach.includes(a.id)&&a.c()){g.ach.push(a.id);toast('🏆 '+a.n+'!')}}
function cD(){g.d++;let b=B[g.tp],rv=0;for(let e of g.em){let sa=(e.s.execution+e.s.creation+e.s.charisma+e.s.logic)/4;rv+=b.r*0.8+sa*10}for(let p of g.pr)rv+=p.q*40*p.l;rv*=1+g.ib;rv*=1+g.rp*0.01;let ex=0;for(let e of g.em)ex+=e.c*0.3;if(g.lo>0)ex+=g.lo*0.02;ex+=1000+g.em.length*200;ex*=1-g.cr;g.dp=Math.floor(rv-ex);g.m+=g.dp;if(g.dp>0)g.tp+=g.dp;if(g.pr>0)g.m+=Math.floor(g.m*g.pr*0.05);g.rp=Math.min(100,g.rp+g.rd);if(Math.random()<0.08){let e=P(EV);e.f(g)}for(let e of g.em){e.ex+=R(1,5);if(e.ex>=e.l*20){e.l++;e.ex=0;let s=P(S);e.s[s]=Math.min(10,e.s[s]+1);ae('⭐ '+e.n+' прокачал '+SN[s]+'!',1)}}cA();if(g.m>=1e6){g.ph='win';clearInterval(tmr);toast('🏆 ИМПЕРИЯ!')}Rr()}
function startTimer(){if(tmr)clearInterval(tmr);tmr=setInterval(()=>{if(g.ph==='win'){clearInterval(tmr);return}dp+=0.015*sp;if(dp>=1){dp=0;cD()}Rr()},40)}
function setSp(s){sp=s;Rr()}
function hire(){if(g.m<B[g.tp].c){toast('❌ Нет денег');return}if(g.em.length>=g.mxE){toast('❌ Мест нет');return}let n=E[g.tp],sk={};for(let s of S)sk[s]=RI(1,5)+(g.tb||0);let e={id:Date.now()+RI(0,999),n:P(n)+' '+String.fromCharCode(65+RI(0,25)),s:sk,c:B[g.tp].c+RI(-20,40),l:1,ex:0};g.m-=e.c;g.em.push(e);g.th++;toast('🤝 '+e.n+' нанят!');Rr()}
function fire(i){if(i<0||i>=g.em.length)return;toast(g.em[i].n+' уволен');g.em.splice(i,1);Rr()}
function mkPr(){if(g.pr.length>=g.mxP){toast('❌ Максимум');return}let c=3000+g.pr.length*2000;if(g.m<c){toast('❌ Нужно '+F(c));return}g.m-=c;g.pr.push({id:Date.now(),n:P(['Базовый','Продвинутый','Премиум','Эконом'])+' #'+(g.pr.length+1),q:Math.min(1,0.5+R(0,0.3)+g.qb),l:1,uc:3000});g.tpr++;toast('📦 Создан!');Rr()}
function upPr(i){let p=g.pr[i];if(!p)return;if(g.m<p.uc){toast('❌ Нужно '+F(p.uc));return}g.m-=p.uc;p.l++;p.q=Math.min(1,p.q+0.12);p.uc=Math.floor(p.uc*1.6);toast('⬆ Улучшено!');Rr()}
function gUC(u){return Math.floor(u.c*Math.pow(u.m,g.up[u.id]||0))}
function buyU(id){let u=U.find(x=>x.id===id);if(!u)return;let c=gUC(u);if(g.m<c){toast('❌ Нужно '+F(c));return}g.m-=c;g.up[id]=(g.up[id]||0)+1;u.f();toast('🏢 '+u.n+'!');Rr()}
function tL(){if(g.lo>0){toast('❌ Верни кредит');return}let a=Math.floor(g.m*2)+5000;g.m+=a;g.lo=Math.floor(a*1.2);toast('💰 Кредит '+F(a));Rr()}
function pL(){if(g.lo<=0)return;if(g.m<g.lo){toast('❌ Не хватает');return}g.m-=g.lo;g.lo=0;toast('✅ Кредит погашен!');Rr()}
function tTh(){st.thm=st.thm==='dark'?'light':'dark';document.body.className='theme-'+st.thm;Rr()}

function Rr(){
  let a=document.getElementById('app');
  if(!g||g.ph==='start'){
    a.innerHTML='<div class=ss><div style="font-size:52px">🏢</div><h1>Бизнес Империя</h1><p>Начни с нуля, найми команду, разработай продукты и заработай 1,000,000💰</p><div class=bg2>'+
      Object.entries(B).map(([k,v])=>'<div class=bc onclick="IG(\''+k+'\')"><div class=ic>'+v.i+'</div><div class=nm>'+v.n+'</div><div class=ds>'+v.d+'<br>💰'+F(v.s)+'</div></div>').join('')+
      '</div><div style="color:var(--dim);font-size:12px">Время идёт автоматически. Управляй скоростью!</div></div>';return
  }
  if(g.ph==='win'){
    a.innerHTML='<div class=ss><div style="font-size:68px">🏆</div><h1>ИМПЕРИЯ ПОСТРОЕНА!</h1><p>1,000,000💰 заработано!</p><div class=c style="text-align:left;width:100%;max-width:340px">'+
      '<div class=r><span class=l>Дней</span><span class=v>'+g.d+'</span></div><div class=r><span class=l>Заработано</span><span class=v>'+F(g.tp)+'</span></div>'+
      '<div class=r><span class=l>Сотрудников</span><span class=v>'+g.th+'</span></div><div class=r><span class=l>Достижений</span><span class=v>'+g.ach.length+'/'+ACH.length+'</span></div></div>'+
      '<button class="btn bp" onclick="g=null;clearInterval(tmr);Rr()">🔄 Сначала</button></div>';return
  }

  let b=B[g.tp],ad=g.ach.length,pl=g.dp,dpp=Math.min(100,dp*100),dc=pl>=0?'var(--green)':'var(--red)';
  let sl=['½×','1×','2×','3×'],sv=[0.5,1,2,3],tbi=[{id:'ov',i:'📊',l:'Обзор'},{id:'em',i:'👥',l:'Команда'},{id:'pr',i:'📦',l:'Продукты'},{id:'up',i:'🏢',l:'Улучшения'},{id:'ach',i:'🏆',l:'Ачивки'}];

  a.innerHTML=
    '<div class=hdr><span class=t>'+b.i+' '+b.n+'</span><span class=m>'+F(g.m)+'💰</span><div class=hdr-r>'+
    sv.map((v,i)=>'<button class="ibtn'+(sp===v?' act':'')+'" onclick="setSp('+v+')">'+sl[i]+'</button>').join('')+
    '<button class=ibtn onclick="ss=1;Rr()">⚙️</button></div></div>'+
    '<div class=tabs>'+tbi.map(t=>'<button class="tab'+(tab===t.id?' act':'')+'" onclick="tab=\''+t.id+'\';Rr()">'+t.i+' '+t.l+(t.id==='ach'&&ad>0?'<span class=b>'+ad+'</span>':'')+'</button>').join('')+'</div>'+
    (g.lo>0?'<div class="ev ev-i" style=cursor:pointer onclick=pL()>💳 Кредит: '+F(g.lo)+' | Погасить</div>':'')+
    '<div class=c><h3>⏳ День '+g.d+'</h3><div class=pb><div class=pf style="width:'+dpp+'%;background:var(--accent)"></div></div>'+
    '<div class=r><span class=l>💰 за день</span><span class=v style=color:'+dc+'>'+F(g.dp)+'</span></div></div>'+
    (tab==='ov'?
    '<div class=c><h3>📈 Показатели</h3><div class=r><span class=l>Команда</span><span class=v>'+g.em.length+'/'+g.mxE+'</span></div><div class=r><span class=l>Продукты</span><span class=v>'+g.pr.length+'/'+g.mxP+'</span></div><div class=r><span class=l>Репутация</span><span class=v>'+g.rp+'/100</span></div><div class=pb><div class=pf style="width:'+g.rp+'%;background:var(--gold)"></div></div><div class=r><span class=l>Заработано</span><span class=v>'+F(g.tp)+'</span></div><div class=r><span class=l>Цель</span><span class=v>'+F(g.m)+' / 1M</span></div><div class=pb><div class=pf style="width:'+Math.min(100,g.m/10000)+'%;background:var(--accent)"></div></div>'+
    (g.ib>0||g.cr>0||g.qb>0||g.pr>0||g.rd>0?'<div style="margin-top:5px;font-size:11px;color:var(--dim)">'+
(g.ib>0?'Дох+'+(g.ib*100)+'% ':'')+(g.cr>0?'Расх-'+(g.cr*100)+'% ':'')+(g.qb>0?'Кач+'+(g.qb*100)+'% ':'')+(g.pr>0?'Пасс+'+(g.pr*100)+'% ':'')+(g.rd>0?'Реп/д +'+g.rd:'')+'</div>':'')+'</div>'+
    (g.em.length===0?'<div class=c><h3>💡 Первые шаги</h3><div style="font-size:13px;color:var(--dim);line-height:1.6">👉 Вкладка <b>Команда</b> — найми сотрудника<br>👉 Вкладка <b>Продукты</b> — создай продукт<br>👉 Покупай улучшения для роста!</div></div>':'')
    :'')+
    (tab==='em'?
    '<button class="btn bp" onclick="hire()"'+(g.m<B[g.tp].c||g.em.length>=g.mxE?' disabled':'')+'>👤 Нанять ('+F(B[g.tp].c)+')</button> <span style="font-size:12px;color:var(--dim)">'+g.em.length+'/'+g.mxE+'</span>'+
    '<div class=g2 style=margin-top:6px>'+(g.em.length===0?'<div style="color:var(--dim);padding:8px;font-size:13px">Пока никого нет</div>':'')+
    g.em.map((e,i)=>'<div class=ic><div style=display:flex;justify-content:space-between><span class=nm>'+e.n+'</span><button class="btn br bs" onclick="fire('+i+')">✕</button></div><div class=st>⭐ Ур.'+e.l+' ('+e.ex+'/'+e.l*20+')</div>'+
    S.map(s=>'<div class=r style="padding:1px 0;font-size:10px"><span class=l>'+SN[s]+'</span><span class=v>'+'▮'.repeat(e.s[s])+'▯'.repeat(10-e.s[s])+'</span></div>').join('')+
    '<div class=st style=margin-top:3px>💰 '+F(Math.floor(e.c*0.3))+'/день</div></div>').join('')+'</div>'
    :'')+
    (tab==='pr'?
    '<button class="btn bp" onclick="mkPr()"'+(g.m<3000+g.pr.length*2000||g.pr.length>=g.mxP?' disabled':'')+'>📦 Создать ('+F(3000+g.pr.length*2000)+')</button> <span style="font-size:12px;color:var(--dim)">'+g.pr.length+'/'+g.mxP+'</span>'+
    '<div class=g2 style=margin-top:6px>'+(g.pr.length===0?'<div style="color:var(--dim);padding:8px">Нет продуктов</div>':'')+
    g.pr.map((p,i)=>'<div class=ic><div class=nm>'+p.n+'</div><div class=st>Ур.'+p.l+' | '+(p.q*100).toFixed(0)+'%</div><div class=st style=color:var(--green)>+'+F(p.q*40*p.l)+'💰/д</div><button class="btn bg bs" style=margin-top:5px onclick="upPr('+i+')"'+(g.m<p.uc?' disabled':'')+'>⬆ '+F(p.uc)+'</button></div>').join('')+'</div>'
    :'')+
    (tab==='up'?
    '<div class=g2>'+U.map(u=>{let lv=g.up[u.id]||0,c=gUC(u);return'<div class=ic'+(lv?' style="border-left:3px solid var(--green)"':'')+'><div class=nm>'+u.i+' '+u.n+'</div><div class=st>'+u.e+(lv?' (ур.'+lv+')':'')+'</div><button class="btn '+(lv?'bo':'bp')+' bs" style=margin-top:5px onclick="buyU(\''+u.id+'\')"'+(g.m<c?' disabled':'')+'>'+(lv?'⬆ '+F(c):'🏪 '+F(c))+'</button></div>'}).join('')+'</div>'
    :'')+
    (tab==='ach'?
    '<div class=g2>'+ACH.map(a=>{let d=g.ach.includes(a.id);return'<div class=ic'+(d?' style="border-left:3px solid var(--gold)"':'')+'><div class=nm>'+(d?'✅':a.i)+' '+a.n+'</div><div class=st style=color:'+(d?'var(--gold)':'var(--dim)')+'>'+a.d+'</div></div>'}).join('')+'</div>'
    :'')+
    '<div style=margin-top:8px>'+g.ev.slice(0,4).map(e=>'<div class="ev ev-'+(e.g?'g':'b')+'">'+(e.g?'✅':'❌')+' '+e.t+'</div>').join('')+'</div>'+
    (ss?SModal():'')+(stut?TModal():'')
}

function SModal(){
  return '<div class=modal onclick="if(event.target===this){ss=0;Rr()}"><div class=mc><h2>⚙️ Настройки</h2>'+
    '<div class=sr><span>🌙 Тёмная тема</span><button class="tg '+(st.thm==='dark'?'on':'off')+'" onclick=tTh()></button></div>'+
    '<div class=sr><span>🔊 Звук</span><button class="tg '+(st.snd?'on':'off')+'" onclick="st.snd=!st.snd;Rr()"></button></div>'+
    '<div class=sr><span>📖 Обучение</span><button class="btn bo bs" onclick="stut=1;ss=0;localStorage.removeItem(\'td\');Rr()">Показать</button></div>'+
    '<div class=sr><span>🔄 Новая игра</span><button class="btn br bs" onclick="if(confirm(\'Начать заново?\')){clearInterval(tmr);g=null;ss=0;Rr()}">Начать</button></div>'+
    '<div style=margin-top:10px;text-align:center><button class="btn bo" onclick="ss=0;Rr()">Закрыть</button></div></div></div>'
}

function TModal(){
  let stp=[
    {i:'🏢',t:'Добро пожаловать!',d:'Бизнес Империя — симулятор предпринимателя. Цель: заработать 1,000,000💰.'},
    {i:'👥',t:'Команда',d:'Нанимай сотрудников во вкладке «Команда». Выше навыки — выше доход.'},
    {i:'📦',t:'Продукты',d:'Создавай продукты. Они приносят доход каждый день.'},
    {i:'🏢',t:'Улучшения',d:'Покупай улучшения: офис, маркетинг, автоматизацию.'},
    {i:'⏳',t:'Время',d:'Время идёт само. Кнопки ½× 1× 2× 3× управляют скоростью.'},
    {i:'🏆',t:'Цель',d:'Накопи 1,000,000💰 и построй империю. Удачи! 🚀'},
  ];
  let si=parseInt(localStorage.getItem('ts')||'0');
  let s=stp[si];
  if(!s){localStorage.removeItem('ts');stut=0;Rr();return''}
  return '<div class=to onclick="if(event.target===this){stut=0;localStorage.setItem(\'td\',1);Rr()}"><div class=tb>'+
    '<div style="font-size:38px;margin-bottom:4px">'+s.i+'</div><h2>'+s.t+'</h2><p>'+s.d+'</p>'+
    '<div class=st>'+stp.map((_,i)=>'<div class="dt '+(i===si?'act':'')+'"></div>').join('')+'</div>'+
    '<div style=display:flex;gap:7px;justify-content:center>'+
    (si>0?'<button class="btn bo" onclick="localStorage.setItem(\'ts\','+(si-1)+');Rr()">←</button>':'')+
    '<button class="btn bp" onclick="localStorage.setItem(\'ts\','+(si+1)+');Rr()">'+(si<stp.length-1?'Далее →':'🚀 Готово!')+'</button>'+
    '<button class="btn bo" onclick="stut=0;localStorage.setItem(\'td\',1);Rr()">✕</button></div></div></div>'
}

Rr();
</script></body></html>
