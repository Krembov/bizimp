<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Бизнес Кликер</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--bg:#f0eef8;--card:#fff;--text:#2d2b4e;--dim:#8e8ba0;--primary:#6c5ce7;--pink:#fd79a8;--orange:#fdcb6e;--green:#00b894;--red:#e17055;--blue:#74b9ff;--shadow:0 2px 12px rgba(108,92,231,0.1);--r:14px}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif;min-height:100vh;overflow:hidden;display:flex;flex-direction:column}
#app{flex:1;overflow-y:auto;padding:10px 12px 70px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:8px 0 6px}
.hdr .t{font-size:17px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .m{font-size:18px;font-weight:800;color:var(--text)}
.hdr .m small{font-weight:400;color:var(--dim);font-size:12px}
.bbtn{display:flex;justify-content:space-around;background:var(--card);border-top:1px solid rgba(108,92,231,0.08);padding:4px 0 env(safe-area-inset-bottom,4px);position:fixed;bottom:0;left:0;right:0;z-index:30;box-shadow:0 -2px 12px rgba(108,92,231,0.06)}
.bbtn button{background:none;border:none;color:var(--dim);font-size:10px;font-weight:600;cursor:pointer;padding:6px 10px;border-radius:10px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.15s}
.bbtn button .bi{font-size:20px;line-height:1.2}
.bbtn button.on{color:var(--primary);background:rgba(108,92,231,0.08)}
.bbtn button.on .bi{transform:scale(1.1)}
.bigc{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 0 10px}
.bigc button{width:130px;height:130px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--primary),#a29bfe);color:#fff;font-size:48px;cursor:pointer;box-shadow:0 8px 30px rgba(108,92,231,0.3);transition:transform .05s;position:relative}
.bigc button:active{transform:scale(0.92)}
.bigc .ct{font-size:22px;font-weight:800;margin-top:8px;color:var(--primary)}
.bigc .cs{font-size:13px;color:var(--dim)}
.card{background:var(--card);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;box-shadow:var(--shadow);border:1px solid rgba(108,92,231,0.04)}
.bcard{background:var(--card);border-radius:var(--r);padding:12px;margin-bottom:8px;box-shadow:var(--shadow);display:flex;align-items:center;gap:10px;border-left:4px solid var(--primary)}
.bcard .bi{font-size:28px}
.bcard .bd{flex:1}
.bcard .bn{font-weight:700;font-size:14px}
.bcard .bl{font-size:11px;color:var(--dim)}
.bcard .bdv{font-size:12px;color:var(--green);font-weight:600}
.bcard .br{text-align:right;flex-shrink:0}
.btn{padding:8px 14px;border-radius:10px;border:none;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:4px}
.btn:active{transform:scale(0.94)}
.btn-p{background:var(--primary);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-o{background:var(--orange);color:#2d2b4e}
.btn-r{background:var(--red);color:#fff}
.btn-w{background:rgba(108,92,231,0.06);color:var(--dim)}
.btn-s{padding:5px 10px;font-size:11px}
.btn:disabled{opacity:.3;cursor:default;transform:none}
.cb{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:6px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-backdrop-filter:blur(4px);backdrop-filter:blur(4px)}
.mc{background:var(--card);border-radius:16px;padding:20px;max-width:340px;width:100%;text-align:center}
.mc h2{font-size:16px;margin-bottom:6px}
.mc p{font-size:13px;color:var(--dim);line-height:1.5;margin-bottom:12px}
.mc .mg{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.fb{width:100%}
.fb .fr{display:flex;justify-content:space-between;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(108,92,231,0.06)}
.fb .fr:last-child{border:none}
.fb .fr .rn{font-weight:700;color:var(--dim);width:32px}
.fb .fr.me{background:rgba(108,92,231,0.06);border-radius:8px;padding:6px 8px;margin:0 -8px;font-weight:700;color:var(--primary)}
.fb .fr.me .rn{color:var(--primary)}
.setr{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:13px}
.setr+.setr{border-top:1px solid rgba(108,92,231,0.06)}
.pb{height:4px;background:rgba(108,92,231,0.08);border-radius:3px;overflow:hidden;margin:6px 0}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--primary),var(--pink));transition:width .3s}
.toast{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:var(--card);padding:10px 18px;border-radius:12px;font-size:13px;font-weight:600;z-index:99;box-shadow:0 4px 20px rgba(0,0,0,0.1);border:1px solid rgba(108,92,231,0.1);animation:td .25s}
@keyframes td{from{opacity:0;transform:translateX(-50%) translateY(-20px)}}
.hi{display:flex;justify-content:center;gap:4px;flex-wrap:wrap;margin:4px 0}
.hi button{background:rgba(108,92,231,0.06);border:none;border-radius:8px;padding:5px 8px;font-size:11px;cursor:pointer;color:var(--dim)}
.hi button.on{background:rgba(108,92,231,0.12);color:var(--primary);font-weight:600}
.scl{text-align:center;color:var(--dim);font-size:12px;padding:4px 0}
.fs{font-size:11px;color:var(--dim)}
h3{font-size:14px;font-weight:700;margin-bottom:6px;color:var(--primary)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:4px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var B=[
  {id:'taxi',i:'🚕',n:'Такси',c:500,d:120,eq:['Машины','Водители']},
  {id:'fast',i:'🍔',n:'Фастфуд',c:2000,d:480,eq:['Кухня','Персонал']},
  {id:'shop',i:'🛒',n:'Магазин',c:10000,d:2400,eq:['Товар','Продавцы']},
  {id:'fact',i:'🏭',n:'Завод',c:50000,d:12000,eq:['Станки','Рабочие']},
  {id:'gdev',i:'🎮',n:'GameDev',c:250000,d:60000,eq:['Компы','Разработчики']},
  {id:'it',i:'💻',n:'IT-Компания',c:1000000,d:300000,eq:['Сервера','Программисты']},
  {id:'bank',i:'🏦',n:'Банк',c:5000000,d:1500000,eq:['Софт','Сотрудники']},
  {id:'kino',i:'🎬',n:'Киностудия',c:25000000,d:7500000,eq:['Камеры','Актёры']},
  {id:'frans',i:'🏪',n:'Франшиза',c:125000000,d:37500000,eq:['Менеджеры','Точки']},
  {id:'space',i:'🚀',n:'Космос',c:625000000,d:180000000,eq:['Технологии','Инженеры']}
];
var FUSION=[
  {a:'taxi',b:'it',c:5000000,n:'📱 Uber 2.0',m:100},
  {a:'fast',b:'frans',c:20000000,n:'🍔 МакДак',m:200},
  {a:'shop',b:'fact',c:50000000,n:'🏭 Супермаркет',m:400},
  {a:'gdev',b:'kino',c:200000000,n:'🎯 Медиа-Гигант',m:1000},
  {a:'bank',b:'house',c:500000000,n:'🏰 ФинИмперия',m:2000},
  {a:'space',b:'it',c:2000000000,n:'🛸 КосмоКорп',m:5000}
];
var HOUSE=[
  {i:'🚗',n:'Гараж',c:1000,d:60},
  {i:'🏡',n:'Дом',c:10000,d:600},
  {i:'🏢',n:'Особняк',c:100000,d:6000},
  {i:'🏰',n:'Замок',c:1000000,d:60000},
  {i:'🏝️',n:'Остров',c:10000000,d:600000}
];
var FORBES=[
  {n:'Начинающий',m:10000},{n:'Местный',m:100000},{n:'Городской',m:1000000},{n:'Региональный',m:10000000},{n:'Национальный',m:100000000},{n:'Топ-менеджер',m:500000000},{n:'Магнат',m:2500000000},{n:'Миллиардер',m:10000000000},{n:'Олигарх',m:50000000000},{n:'Император',m:500000000000}
];
var CLICK_UP=[
  {m:1,c:0},{m:5,c:100},{m:10,c:500},{m:50,c:5000},{m:100,c:50000},{m:500,c:500000},{m:1000,c:5000000},{m:5000,c:50000000},{m:10000,c:500000000},{m:50000,c:5000000000},{m:100000,c:50000000000},{m:500000,c:500000000000}
];
function F(n){if(n>=1e12)return(n/1e12).toFixed(1)+'T';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n).toLocaleString('ru-RU')}
var g,money=0,tab='click',tmr=null,st=1,clickLv=0,hLv=-1,mode=1,fused={};
var bus={};for(var i=0;i<B.length;i++){var b=B[i];bus[b.id]={lv:0,eq:[0,0]}}
function toast(t){var e=document.createElement('div');e.className='toast';e.textContent=t;document.body.appendChild(e);setTimeout(function(){e.remove()},1800)}
function tick(){var inc=0;for(var i=0;i<B.length;i++){var b=B[i],s=bus[b.id];if(s.lv>0){var bd=b.d*(1+s.lv*0.2);bd*=1+(s.eq[0]>0?0.5:0)+(s.eq[1]>0?0.5:0);if(fused[b.id])bd*=fused[b.id];inc+=bd}}if(hLv>=0){var h=HOUSE[hLv];inc+=h.d}money+=inc/60;R()}
function start(){if(tmr)return;tmr=setInterval(tick,1000)}
function R(){Rr()}
function Rr(){document.getElementById('app').innerHTML=H()}
function H(){var h='<div class=hdr><span class=t>🏢 Бизнес Кликер</span><span class=m>'+F(money)+'<small>💰</small></span></div>';switch(tab){case'click':h+=HC();break;case'bus':h+=HB();break;case'house':h+=HH();break;case'fusion':h+=HF();break;case'forbes':h+=HFO();break;case'set':h+=HS();break}h+=BB();return h}
function BB(){return'<div class=bbtn>'+[
  ['click','🖱️','Кликер'],
  ['bus','💼','Бизнес'],
  ['house','🏠','Дом'],
  ['fusion','🔬','Слияния'],
  ['forbes','📊','Forbes'],
  ['set','⚙️','Настройки']
].map(function(t){return'<button class="'+(tab===t[0]?'on':'')+'" onclick="tab=\''+t[0]+'\';R()"><span class=bi>'+t[1]+'</span>'+t[2]+'</button>'}).join('')+'</div>'}

function HC(){
  var cl=CLICK_UP[clickLv]||CLICK_UP[CLICK_UP.length-1];
  var nx=CLICK_UP[clickLv+1];
  var h='<div class=bigc><button onclick="ck()">🖱️</button><div class=ct>+'+F(cl.m)+'💰</div><div class=cs>за клик</div></div>';
  h+='<div class=card><h3>⚡ Улучшить клик</h3><div class=pb><div class=pf style="width:'+(clickLv/CLICK_UP.length*100)+'%"></div></div>';
  if(nx)h+='<div style=display:flex;justify-content:space-between;align-items:center><span>×'+nx.m+': <b>'+F(nx.c)+'💰</b></span><button class="btn btn-p btn-s" onclick="buyC()"'+(money<nx.c?' disabled':'')+'>Улучшить</button></div>';
  else h+='<div style=color:var(--green);font-weight:600>✅ MAX</div>';
  h+='</div>';
  h+='<div class=card><h3>⏱ Доход в минуту</h3>';
  var ti=0;for(var i=0;i<B.length;i++){var b=B[i],s=bus[b.id];if(s.lv>0){var bd=b.d*(1+s.lv*0.2);bd*=1+(s.eq[0]>0?0.5:0)+(s.eq[1]>0?0.5:0);if(fused[b.id])bd*=fused[b.id];ti+=bd}}
  if(hLv>=0){var hh=HOUSE[hLv];ti+=hh.d}
  h+='<div style=font-size:22px;font-weight:800;color:var(--green)>+'+F(ti)+'💰</div></div>';
  return h
}
function ck(){money+=CLICK_UP[clickLv].m;R()}
function buyC(){var nx=CLICK_UP[clickLv+1];if(!nx||money<nx.c)return;money-=nx.c;clickLv++;toast('⚡ Клик ×'+nx.m+'!');R()}

function HB(){
  var h='';
  for(var i=0;i<B.length;i++){var b=B[i],s=bus[b.id];
    var bd=b.d*(1+s.lv*0.2);bd*=1+(s.eq[0]>0?0.5:0)+(s.eq[1]>0?0.5:0);
    if(fused[b.id]){bd*=fused[b.id];h+='<div class=bcard style="border-left-color:var(--pink);background:linear-gradient(135deg,var(--card),rgba(253,121,168,0.05))"><div class=bi>'+b.i+'</div><div class=bd><div class=bn>'+b.n+'</div><div class=bdv>⬟ СЛИТО ×'+fused[b.id]+'</div><div class=bl>ур.'+s.lv+' | '+b.eq[0]+' +'+(s.eq[0]>0?'✅':'❌')+' | '+b.eq[1]+' +'+(s.eq[1]>0?'✅':'❌')+'</div></div><div class=br><div style=color:var(--pink);font-weight:700>+'+F(bd)+'/мин</div></div></div>';continue}
    if(s.lv===0){h+='<div class=card style=display:flex;align-items:center;gap:10px><span style=font-size:28px>'+b.i+'</span><div style=flex:1><b>'+b.n+'</b><br><span class=fs>'+F(b.d)+'💰/мин</span></div><button class="btn btn-g" onclick="buyB('+i+')"'+(money<b.c?' disabled':'')+'>'+F(b.c)+'💰</button></div>';continue}
    var upc=Math.floor(b.c*Math.pow(1.5,s.lv));
    h+='<div class=bcard><div class=bi>'+b.i+'</div><div class=bd><div class=bn>'+b.n+' ур.'+s.lv+'</div><div class=bdv>+'+F(bd)+'💰/мин</div><div class=bl>';
    for(var e=0;e<2;e++){var ec=Math.floor(b.c*(e+1)*2*(s.eq[e]+1));h+='<span style=cursor:pointer onclick="buyEq('+i+','+e+')" title="'+b.eq[e]+' ур.'+s.eq[e]+'">'+(s.eq[e]>0?'✅':'⬜')+' '+b.eq[e]+' <span class=fs>'+F(ec)+'</span></span>'+(e===0?' | ':'')}
    h+='</div></div><div class=br><button class="btn btn-p btn-s" onclick="upB('+i+')"'+(money<upc?' disabled':'')+'>⬆ '+F(upc)+'</button></div></div>'}
  return h
}
function buyB(i){var b=B[i];if(money<b.c)return;money-=b.c;bus[b.id].lv=1;start();toast('🚀 '+b.n+' куплен!');R()}
function upB(i){var b=B[i],s=bus[b.id];if(s.lv<1)return;var c=Math.floor(b.c*Math.pow(1.5,s.lv));if(money<c)return;money-=c;s.lv++;toast('⬆ '+b.n+' ур.'+s.lv);R()}
function buyEq(i,e){var b=B[i],s=bus[b.id];if(s.lv<1)return;var c=Math.floor(b.c*(e+1)*2*(s.eq[e]+1));if(money<c)return;money-=c;s.eq[e]++;toast('🔧 '+b.eq[e]+' +1');R()}

function HH(){
  var h='<div class=card><h3>🏠 Недвижимость</h3>';
  if(hLv===-1)h+='<div style=font-size:12px;color:var(--dim);margin-bottom:6px>Купи свой первый дом!</div>';
  else{var ch=HOUSE[hLv];h+='<div style=display:flex;align-items:center;gap:10px;margin-bottom:8px><span style=font-size:36px>'+ch.i+'</span><div><b>'+ch.n+'</b><br><span style=color:var(--green);font-weight:600>+'+F(ch.d)+'💰/мин</span></div></div>'}
  var nx=HOUSE[hLv+1];
  if(nx)h+='<div style=display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-top:1px solid rgba(108,92,231,0.06)><span>След: <b>'+nx.i+' '+nx.n+'</b> — '+F(nx.d)+'💰/мин</span><button class="btn btn-p btn-s" onclick="buyH()"'+(money<nx.c?' disabled':'')+'>'+F(nx.c)+'💰</button></div>';
  else h+='<div style=color:var(--green);font-weight:600;padding:6px 0;border-top:1px solid rgba(108,92,231,0.06)>✅ Вся недвижимость твоя!</div>';
  h+='</div>';return h
}
function buyH(){var nx=HOUSE[hLv+1];if(!nx||money<nx.c)return;money-=nx.c;hLv++;toast('🏠 '+nx.n+' куплен!');R()}

function HF(){
  var h='<div class=card><h3>🔬 Слияния</h3>';
  var any=false;
  for(var i=0;i<FUSION.length;i++){var f=FUSION[i];
    var aS=f.a==='house'?hLv>=0:bus[f.a]&&bus[f.a].lv>=5;
    var bS=bus[f.b]&&bus[f.b].lv>=5;
    var done=fused[f.a]||fused[f.b]||(f.a!=='house'&&f.b!=='house'&&fused[f.a]&&fused[f.b]);
    if(done){h+='<div style=padding:6px 0;border-bottom:1px solid rgba(108,92,231,0.06);display:flex;justify-content:space-between><span>'+f.n+'</span><span style=color:var(--green)>✅</span></div>';continue}
    if(!aS||!bS){h+='<div style=padding:6px 0;border-bottom:1px solid rgba(108,92,231,0.06);color:var(--dim);font-size:12px>🔒 '+f.n+' (треб: '+(f.a==='house'?'🏠 Дом':'ур.5 '+(B.find(function(x){return x.id===f.a})||{}).n)+' + ур.5 '+(B.find(function(x){return x.id===f.b})||{}).n+')</div>';continue}
    any=true;
    h+='<div style=padding:8px 0;border-bottom:1px solid rgba(108,92,231,0.06);display:flex;justify-content:space-between;align-items:center><div><b>'+f.n+'</b><br><span class=fs>×'+f.m+' к доходу</span></div><button class="btn btn-p btn-s" onclick="doFusion('+i+')"'+(money<f.c?' disabled':'')+'>'+F(f.c)+'💰</button></div>'}
  if(!any)h+='<div style=font-size:12px;color:var(--dim)>Достигни ур.5 бизнесов чтобы открыть слияния</div>';
  h+='</div>';return h
}
function doFusion(i){var f=FUSION[i];if(money<f.c)return;money-=f.c;var mid=f.a==='house'?f.b:f.a;fused[mid]=f.m;toast('✨ '+f.n+' создана!');R()}

function HFO(){
  var h='<div class=card><h3>📊 Forbes</h3><div class=fb>';
  var rank=-1;
  for(var i=FORBES.length-1;i>=0;i--){if(money>=FORBES[i].m){rank=i;break}}
  for(var i=FORBES.length-1;i>=0;i--){var f=FORBES[i];
    h+='<div class="fr'+(i===rank?' me':'')+'"><span class=rn>'+(i===FORBES.length-1?'🥇':'#'+(i+1))+'</span><span style=flex:1>'+f.n+'</span><span>'+F(f.m)+'💰</span></div>'}
  h+='</div></div>';return h
}

function HS(){
  return'<div class=card><h3>⚙️ Настройки</h3><div class=setr><span>⏱ Скорость</span><div class=hi><button class="'+(st===1?'on':'')+'" onclick="st=1;R()">×1</button><button class="'+(st===2?'on':'')+'" onclick="st=2;R()">×2</button><button class="'+(st===3?'on':'')+'" onclick="st=3;R()">×3</button></div></div><div class=setr><span>🔄 Новая игра</span><button class="btn btn-r btn-s" onclick="if(confirm(\'Начать заново?\')){resetGame()}">Сброс</button></div></div>'
}
function resetGame(){clearInterval(tmr);tmr=null;money=0;clickLv=0;hLv=-1;st=1;fused={};for(var i=0;i<B.length;i++){var b=B[i];bus[b.id]={lv:0,eq:[0,0]}}tab='click';R()}

R();start();
</script>
</body>
</html>
