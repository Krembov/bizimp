<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Бизнес Кликер</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--bg:#e8e6f5;--card:#fff;--text:#2a2748;--dim:#8a879e;--primary:#6c5ce7;--pink:#fd79a8;--orange:#fdcb6e;--green:#00b894;--red:#e17055;--blue:#74b9ff;--shadow:0 4px 20px rgba(108,92,231,0.1);--r:16px}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Segoe UI',sans-serif}
#app{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;padding:12px 14px 80px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 0 8px}
.hdr .t{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .m{font-size:22px;font-weight:800;color:var(--text);background:rgba(108,92,231,0.06);padding:6px 14px;border-radius:30px}
.hdr .m small{font-weight:400;color:var(--dim);font-size:14px;margin-left:2px}
.bbtn{display:flex;justify-content:space-around;background:var(--card);border-top:1px solid rgba(108,92,231,0.08);padding:4px 0 env(safe-area-inset-bottom,4px);position:fixed;bottom:0;left:0;right:0;z-index:30;box-shadow:0 -4px 20px rgba(108,92,231,0.08)}
.bbtn button{background:none;border:none;color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;padding:8px 14px;border-radius:14px;display:flex;flex-direction:column;align-items:center;gap:2px;transition:.15s;min-width:56px}
.bbtn button .bi{font-size:24px;line-height:1.2}
.bbtn button.on{color:var(--primary);background:rgba(108,92,231,0.1)}
.bbtn button.on .bi{transform:scale(1.15)}
.bigc{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 0 10px}
.bigc .coinWrap{position:relative;margin-bottom:4px}
.bigc .coinWrap::before{content:'';position:absolute;top:50%;left:50%;width:220px;height:220px;transform:translate(-50%,-50%);border-radius:50%;background:radial-gradient(circle,rgba(108,92,231,0.12) 0%,transparent 70%);animation:cg 3s ease-in-out infinite}
@keyframes cg{0%,100%{transform:translate(-50%,-50%) scale(1);opacity:1}50%{transform:translate(-50%,-50%) scale(1.15);opacity:.6}}
.bigc button{width:160px;height:160px;border-radius:50%;border:4px solid rgba(255,255,255,0.3);background:linear-gradient(135deg,#6c5ce7,#a29bfe,#fd79a8);color:#fff;font-size:64px;cursor:pointer;box-shadow:0 8px 32px rgba(108,92,231,0.4),inset 0 -4px 12px rgba(0,0,0,0.1);transition:transform .06s;position:relative;touch-action:manipulation;text-shadow:0 2px 8px rgba(0,0,0,0.15)}
.bigc button:active{transform:scale(0.85)}
.bigc .ctWrap{display:flex;align-items:baseline;gap:4px;margin-top:6px}
.bigc .ct{font-size:32px;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.bigc .cs{font-size:15px;color:var(--dim);font-weight:500}
.fly{position:fixed;pointer-events:none;font-weight:900;font-size:22px;z-index:50;animation:fy .9s ease-out forwards;text-shadow:0 2px 8px rgba(0,0,0,0.1)}
@keyframes fy{0%{opacity:1;transform:translateY(0) scale(1) translateX(0)}100%{opacity:0;transform:translateY(-100px) scale(1.5) translateX(30px)}}
.spark{position:fixed;pointer-events:none;z-index:49;animation:sp .6s ease-out forwards}
@keyframes sp{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(0) translateY(-40px)}}
.card{background:var(--card);border-radius:var(--r);padding:16px 18px;margin-bottom:10px;box-shadow:var(--shadow);border:1px solid rgba(108,92,231,0.04)}
.bcard{background:var(--card);border-radius:var(--r);padding:14px 16px;margin-bottom:10px;box-shadow:var(--shadow);display:flex;align-items:center;gap:12px;border-left:5px solid var(--primary)}
.bcard .bi{font-size:34px}
.bcard .bd{flex:1}
.bcard .bn{font-weight:700;font-size:16px}
.bcard .bl{font-size:12px;color:var(--dim);margin-top:2px}
.bcard .bdv{font-size:14px;color:var(--green);font-weight:600}
.bcard .br{text-align:right;flex-shrink:0}
.btn{padding:12px 20px;border-radius:14px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:4px;touch-action:manipulation}
.btn:active{transform:scale(0.93)}
.btn-p{background:var(--primary);color:#fff}
.btn-g{background:var(--green);color:#fff}
.btn-o{background:var(--orange);color:#2a2748}
.btn-r{background:var(--red);color:#fff}
.btn-w{background:rgba(108,92,231,0.07);color:var(--dim)}
.btn:disabled{opacity:.3;cursor:default;transform:none}
.fb{width:100%}
.fb .fr{display:flex;justify-content:space-between;padding:10px 0;font-size:15px;border-bottom:1px solid rgba(108,92,231,0.06)}
.fb .fr:last-child{border:none}
.fb .fr .rn{font-weight:700;color:var(--dim);width:36px}
.fb .fr.me{background:rgba(108,92,231,0.08);border-radius:12px;padding:10px 12px;margin:0 -12px;font-weight:700;color:var(--primary)}
.fb .fr.me .rn{color:var(--primary)}
.setr{display:flex;justify-content:space-between;align-items:center;padding:12px 0;font-size:15px}
.setr+.setr{border-top:1px solid rgba(108,92,231,0.06)}
.pb{height:6px;background:rgba(108,92,231,0.1);border-radius:4px;overflow:hidden;margin:8px 0}
.pf{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--primary),var(--pink));transition:width .3s}
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%);background:var(--card);padding:14px 24px;border-radius:16px;font-size:15px;font-weight:600;z-index:99;box-shadow:0 6px 30px rgba(0,0,0,0.12);border:1px solid rgba(108,92,231,0.1);animation:td .25s;white-space:nowrap}
@keyframes td{from{opacity:0;transform:translateX(-50%) translateY(-24px)}}
.hi{display:flex;justify-content:center;gap:6px;flex-wrap:wrap;margin:6px 0}
.hi button{background:rgba(108,92,231,0.07);border:none;border-radius:12px;padding:8px 16px;font-size:14px;cursor:pointer;color:var(--dim);touch-action:manipulation}
.hi button.on{background:rgba(108,92,231,0.15);color:var(--primary);font-weight:600}
.scl{text-align:center;color:var(--dim);font-size:13px;padding:6px 0}
.fs{font-size:12px;color:var(--dim)}
h3{font-size:16px;font-weight:700;margin-bottom:8px;color:var(--primary)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--dim);border-radius:6px}
</style>
</head>
<body>
<div id="app"></div>
<script>
var B=[
  {id:'taxi',i:'🚕',n:'Такси',c:500,d:120,eq:['Машины','Водители']},
  {id:'fast',i:'🍔',n:'Фастфуд',c:2000,d:480,eq:['Кухня','Персонал']},
  {id:'shop',i:'🛒',n:'Магазин',c:10000,d:2400,eq:['Товар','Продавцы']},
  {id:'fact',i:'🏭',n:'Завод',c:50000,d:12000,eq:['Станки','Рабочие']},
  {id:'gdev',i:'🎮',n:'GameDev',c:250000,d:60000,eq:['Компы','Разработчики']},
  {id:'it',i:'💻',n:'IT-Компания',c:1000000,d:300000,eq:['Сервера','Программисты']},
  {id:'bank',i:'🏦',n:'Банк',c:5000000,d:1500000,eq:['Софт','Сотрудники']},
  {id:'kino',i:'🎬',n:'Киностудия',c:25000000,d:7500000,eq:['Камеры','Актёры']},
  {id:'frans',i:'🏪',n:'Франшиза',c:125000000,d:37500000,eq:['Менеджеры','Точки']},
  {id:'space',i:'🚀',n:'Космос',c:625000000,d:180000000,eq:['Технологии','Инженеры']}
];
var FUSION=[
  {a:'taxi',b:'it',c:5000000,n:'📱 Uber 2.0',m:100},
  {a:'fast',b:'frans',c:20000000,n:'🍔 МакДак',m:200},
  {a:'shop',b:'fact',c:50000000,n:'🏭 Супермаркет',m:400},
  {a:'gdev',b:'kino',c:200000000,n:'🎯 Медиа-Гигант',m:1000},
  {a:'bank',b:'house',c:500000000,n:'🏰 ФинИмперия',m:2000},
  {a:'space',b:'it',c:2000000000,n:'🛸 КосмоКорп',m:5000}
];
var HOUSE=[
  {i:'🚗',n:'Гараж',c:1000,d:60},
  {i:'🏡',n:'Дом',c:10000,d:600},
  {i:'🏢',n:'Особняк',c:100000,d:6000},
  {i:'🏰',n:'Замок',c:1000000,d:60000},
  {i:'🏝️',n:'Остров',c:10000000,d:600000}
];
var FORBES=[
  {n:'Начинающий',m:10000},{n:'Местный',m:100000},{n:'Городской',m:1000000},{n:'Региональный',m:10000000},{n:'Национальный',m:100000000},{n:'Топ-менеджер',m:500000000},{n:'Магнат',m:2500000000},{n:'Миллиардер',m:10000000000},{n:'Олигарх',m:50000000000},{n:'Император',m:500000000000}
];
var CLICK_UP=[
  {m:1,c:0},{m:5,c:100},{m:10,c:500},{m:50,c:5000},{m:100,c:50000},{m:500,c:500000},{m:1000,c:5000000},{m:5000,c:50000000},{m:10000,c:500000000},{m:50000,c:5000000000},{m:100000,c:50000000000},{m:500000,c:500000000000}
];
function F(n){if(n>=1e12)return(n/1e12).toFixed(1)+'T';if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return Math.floor(n).toLocaleString('ru-RU')}
var g,money=0,tab='click',tmr=null,st=1,clickLv=0,hLv=-1,mode=1,fused={},sv=0;
var bus={};for(var i=0;i<B.length;i++){var b=B[i];bus[b.id]={lv:0,eq:[0,0]}}
function save(){try{var d={money:money,clickLv:clickLv,hLv:hLv,st:st,fused:fused,bus:bus};localStorage.setItem('bizSave',JSON.stringify(d))}catch(e){}}
function load(){try{var r=localStorage.getItem('bizSave');if(!r)return;var d=JSON.parse(r);money=d.money||0;clickLv=d.clickLv||0;hLv=d.hLv??-1;st=d.st||1;fused=d.fused||{};if(d.bus)for(var k in d.bus){if(bus[k]){bus[k].lv=d.bus[k].lv||0;bus[k].eq=d.bus[k].eq||[0,0]}}}catch(e){}}
function toast(t){var e=document.createElement('div');e.className='toast';e.textContent=t;document.body.appendChild(e);setTimeout(function(){e.remove()},1800)}
function tick(){var inc=0;for(var i=0;i<B.length;i++){var b=B[i],s=bus[b.id];if(s.lv>0){var bd=b.d*(1+s.lv*0.2);bd*=1+(s.eq[0]>0?0.5:0)+(s.eq[1]>0?0.5:0);if(fused[b.id])bd*=fused[b.id];inc+=bd}}if(hLv>=0){var hh=HOUSE[hLv];inc+=hh.d}var add=Math.round(inc/60);if(add>0&&tab==='click'){fly('+'+F(add)+'💰')}money+=add;sv++;if(sv%5===0)save();R()}
function start(){if(tmr)return;t();}
function t(){tmr=setTimeout(function(){tick();t()},1000/st)}
function R(){Rr()}
function Rr(){document.getElementById('app').innerHTML=H()}
function H(){var h='<div class=hdr><span class=t>🏢 Бизнес Кликер</span><span class=m>'+F(money)+'<small>💰</small></span></div>';switch(tab){case'click':h+=HC();break;case'bus':h+=HB();break;case'house':h+=HH();break;case'fusion':h+=HF();break;case'forbes':h+=HFO();break;case'set':h+=HS();break}h+=BB();return h}
function BB(){return'<div class=bbtn>'+[
  ['click','🖱️','Кликер'],
  ['bus','💼','Бизнес'],
  ['house','🏠','Дом'],
  ['fusion','🔬','Слияния'],
  ['forbes','📊','Forbes'],
  ['set','⚙️','Настройки']
].map(function(t){return'<button class="'+(tab===t[0]?'on':'')+'" onclick="tab=\''+t[0]+'\';R()"><span class=bi>'+t[1]+'</span>'+t[2]+'</button>'}).join('')+'</div>'}

function HC(){
  var cl=CLICK_UP[clickLv]||CLICK_UP[CLICK_UP.length-1];
  var nx=CLICK_UP[clickLv+1];
  var ti=0;for(var i=0;i<B.length;i++){var b=B[i],s=bus[b.id];if(s.lv>0){var bd=b.d*(1+s.lv*0.2);bd*=1+(s.eq[0]>0?0.5:0)+(s.eq[1]>0?0.5:0);if(fused[b.id])bd*=fused[b.id];ti+=bd}}
  if(hLv>=0){var hh=HOUSE[hLv];ti+=hh.d}
  var h='<div class=bigc><div class=coinWrap><button onclick="ck()">💰</button></div><div class=ctWrap><span class=ct>+'+F(cl.m)+'</span><span class=cs>💰 за клик</span></div></div>';
  h+='<div class=card style="background:linear-gradient(135deg,var(--card),rgba(108,92,231,0.03))"><div style=display:flex;justify-content:space-around;text-align:center><div><div style=font-size:18px;font-weight:700;color:var(--green)>+'+F(ti)+'💰</div><div class=fs>в минуту</div></div><div><div style=font-size:16px;font-weight:600;color:var(--dim)>+'+F(Math.round(ti/60))+'💰</div><div class=fs>в секунду</div></div><div><div style=font-size:16px;font-weight:600;color:var(--pink)>'+F(cl.m)+'💰</div><div class=fs>за клик</div></div></div></div>';
  h+='<div class=card><div style=display:flex;justify-content:space-between;align-items:center;margin-bottom:4px><h3 style=margin:0>⚡ Усиление клика</h3><span style=font-size:13px;color:var(--dim)>×'+cl.m+'</span></div><div class=pb><div class=pf style="width:'+(clickLv/(CLICK_UP.length-1)*100)+'%"></div></div>';
  if(nx)h+='<div style=display:flex;justify-content:space-between;align-items:center><span style=font-size:14px>×'+nx.m+' — <b>'+F(nx.c)+'💰</b></span><button class="btn btn-p" onclick="buyC()"'+(money<nx.c?' disabled':'')+'>⬆ Улучшить</button></div>';
  else h+='<div style=text-align:center;color:var(--green);font-weight:700;font-size:15px>✅ МАКСИМУМ!</div>';
  h+='</div>';
  var rk=-1;for(var i=FORBES.length-1;i>=0;i--){if(money>=FORBES[i].m){rk=i;break}}
  if(rk>=0&&rk<FORBES.length-1){var cur=FORBES[rk].m,nxt=FORBES[rk+1].m,pct=Math.min(100,(money-cur)/(nxt-cur)*100);
  h+='<div class=card><h3>📊 Forbes</h3><div style=display:flex;justify-content:space-between;font-size:13px;margin-bottom:2px><span style=font-weight:600>'+FORBES[rk].n+'</span><span style=color:var(--dim);font-size:12px>➜ '+FORBES[rk+1].n+'</span></div><div class=pb><div class=pf style=width:'+pct+'%></div></div><div style=text-align:center;font-size:12px;color:var(--dim)>Ещё <b>'+F(nxt-money)+'💰</b> до следующего ранга</div></div>'}
  return h
}
function ck(){var am=CLICK_UP[clickLv].m;money+=am;fly('+'+F(am)+'💰');sparks();R()}
function fly(t){var e=document.createElement('div');e.className='fly';var b=document.querySelector('.bigc button');var x=window.innerWidth/2,y=60;if(b){var r=b.getBoundingClientRect();x=r.left+r.width/2;y=r.top-10}e.textContent=t;e.style.left=(x-60+Math.random()*40)+'px';e.style.top=(y-10+Math.random()*20)+'px';e.style.color=['#6c5ce7','#fd79a8','#00b894','#fdcb6e','#fdcb6e'][Math.floor(Math.random()*5)];document.body.appendChild(e);setTimeout(function(){e.remove()},1000)}
function sparks(){var b=document.querySelector('.bigc button');if(!b)return;var r=b.getBoundingClientRect();var cx=r.left+r.width/2,cy=r.top+r.height/2;for(var i=0;i<6;i++){var e=document.createElement('div');e.className='spark';var a=Math.random()*6.28;var d=30+Math.random()*60;e.textContent=['✦','✧','⬩','💎','⭐','✨'][Math.floor(Math.random()*6)];e.style.left=(cx+Math.cos(a)*d-10)+'px';e.style.top=(cy+Math.sin(a)*d-10)+'px';e.style.fontSize=(12+Math.random()*14)+'px';e.style.color=['#6c5ce7','#a29bfe','#fd79a8','#fdcb6e','#fff'][Math.floor(Math.random()*5)];document.body.appendChild(e);setTimeout(function(){e.remove()},700)}}
function buyC(){var nx=CLICK_UP[clickLv+1];if(!nx||money<nx.c)return;money-=nx.c;clickLv++;save();toast('⚡ Клик ×'+nx.m+'!');R()}

function HB(){
  var h='';
  for(var i=0;i<B.length;i++){var b=B[i],s=bus[b.id];
    var bd=b.d*(1+s.lv*0.2);bd*=1+(s.eq[0]>0?0.5:0)+(s.eq[1]>0?0.5:0);
    if(fused[b.id]){bd*=fused[b.id];h+='<div class=bcard style="border-left-color:var(--pink);background:linear-gradient(135deg,var(--card),rgba(253,121,168,0.05))"><div class=bi>'+b.i+'</div><div class=bd><div class=bn>'+b.n+'</div><div class=bdv style="color:var(--pink)">✨ СЛИТО ×'+fused[b.id]+'</div><div class=bl>ур.'+s.lv+' | '+b.eq[0]+' '+(s.eq[0]>0?'✅':'⬜')+' | '+b.eq[1]+' '+(s.eq[1]>0?'✅':'⬜')+'</div></div><div class=br><div style=color:var(--pink);font-weight:700;font-size:16px>+'+F(bd)+'/мин</div></div></div>';continue}
    if(s.lv===0){h+='<div class=card style=display:flex;align-items:center;gap:12px><span style=font-size:36px>'+b.i+'</span><div style=flex:1><b style=font-size:15px>'+b.n+'</b><br><span class=fs>'+F(b.d)+'💰/мин</span></div><button class="btn btn-g" onclick="buyB('+i+')"'+(money<b.c?' disabled':'')+'>'+F(b.c)+'💰</button></div>';continue}
    var upc=Math.floor(b.c*Math.pow(1.5,s.lv));
    h+='<div class=bcard><div class=bi>'+b.i+'</div><div class=bd><div class=bn>'+b.n+' ур.'+s.lv+'</div><div class=bdv>+'+F(bd)+'💰/мин</div><div class=bl>';
    for(var e=0;e<2;e++){var ec=Math.floor(b.c*(e+1)*2*(s.eq[e]+1));h+='<span style=cursor:pointer;display:inline-block;padding:2px 6px;background:rgba(108,92,231,0.04);border-radius:8px;margin:1px 2px" onclick="buyEq('+i+','+e+')">'+(s.eq[e]>0?'✅':'⬜')+' '+b.eq[e]+' <span class=fs>'+F(ec)+'</span></span>'}
    h+='</div></div><div class=br><button class="btn btn-p" onclick="upB('+i+')"'+(money<upc?' disabled':'')+'>⬆ '+F(upc)+'💰</button></div></div>'}
  return h
}
function buyB(i){var b=B[i];if(money<b.c)return;money-=b.c;bus[b.id].lv=1;start();save();toast('🚀 '+b.n+' куплен!');R()}
function upB(i){var b=B[i],s=bus[b.id];if(s.lv<1)return;var c=Math.floor(b.c*Math.pow(1.5,s.lv));if(money<c)return;money-=c;s.lv++;save();toast('⬆ '+b.n+' ур.'+s.lv);R()}
function buyEq(i,e){var b=B[i],s=bus[b.id];if(s.lv<1)return;var c=Math.floor(b.c*(e+1)*2*(s.eq[e]+1));if(money<c)return;money-=c;s.eq[e]++;save();toast('🔧 '+b.eq[e]+' +1');R()}

function HH(){
  var h='<div class=card><h3>🏠 Недвижимость</h3>';
  if(hLv===-1)h+='<div style=font-size:14px;color:var(--dim);margin-bottom:8px>Купи свой первый дом!</div>';
  else{var ch=HOUSE[hLv];h+='<div style=display:flex;align-items:center;gap:14px;margin-bottom:10px><span style=font-size:44px>'+ch.i+'</span><div><b style=font-size:18px>'+ch.n+'</b><br><span style=color:var(--green);font-weight:600;font-size:16px>+'+F(ch.d)+'💰/мин</span></div></div>'}
  var nx=HOUSE[hLv+1];
  if(nx)h+='<div style=display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid rgba(108,92,231,0.06)>><div style=font-size:15px>След: <b>'+nx.i+' '+nx.n+'</b><br><span class=fs>'+F(nx.d)+'💰/мин</span></div><button class="btn btn-p" onclick="buyH()"'+(money<nx.c?' disabled':'')+'>🏠 '+F(nx.c)+'💰</button></div>';
  else h+='<div style=color:var(--green);font-weight:600;padding:6px 0;border-top:1px solid rgba(108,92,231,0.06)>✅ Вся недвижимость твоя!</div>';
  h+='</div>';return h
}
function buyH(){var nx=HOUSE[hLv+1];if(!nx||money<nx.c)return;money-=nx.c;hLv++;save();toast('🏠 '+nx.n+' куплен!');R()}

function HF(){
  var h='<div class=card><h3>🔬 Слияния</h3>';
  var any=false;
  for(var i=0;i<FUSION.length;i++){var f=FUSION[i];
    var aS=f.a==='house'?hLv>=0:bus[f.a]&&bus[f.a].lv>=5;
    var bS=bus[f.b]&&bus[f.b].lv>=5;
    var done=fused[f.a]||fused[f.b]||(f.a!=='house'&&f.b!=='house'&&fused[f.a]&&fused[f.b]);
    if(done){h+='<div style=padding:8px 0;border-bottom:1px solid rgba(108,92,231,0.06);display:flex;justify-content:space-between;align-items:center><span style=font-size:15px>'+f.n+'</span><span style=color:var(--green);font-weight:600>✅ Слито</span></div>';continue}
    if(!aS||!bS){h+='<div style=padding:8px 0;border-bottom:1px solid rgba(108,92,231,0.06);color:var(--dim);font-size:13px>🔒 '+f.n+'<br><span class=fs>треб: '+(f.a==='house'?'🏠 Дом':'ур.5 '+(B.find(function(x){return x.id===f.a})||{}).n)+' + ур.5 '+(B.find(function(x){return x.id===f.b})||{}).n+'</span></div>';continue}
    any=true;
    h+='<div style=padding:10px 0;border-bottom:1px solid rgba(108,92,231,0.06);display:flex;justify-content:space-between;align-items:center><div><b style=font-size:15px>'+f.n+'</b><br><span class=fs>×'+f.m+' к доходу</span></div><button class="btn btn-p" onclick="doFusion('+i+')"'+(money<f.c?' disabled':'')+'><span style=font-size:16px>🔬</span> '+F(f.c)+'💰</button></div>'}
  if(!any)h+='<div style=font-size:14px;color:var(--dim);text-align:center;padding:12px 0>🔒 Достигни ур.5 у двух бизнесов, чтобы открыть слияния</div>';
  h+='</div>';return h
}
function doFusion(i){var f=FUSION[i];if(money<f.c)return;money-=f.c;var mid=f.a==='house'?f.b:f.a;fused[mid]=f.m;save();toast('✨ '+f.n+' создана!');R()}

function HFO(){
  var h='<div class=card><h3>📊 Forbes</h3><div class=fb>';
  var rank=-1;
  for(var i=FORBES.length-1;i>=0;i--){if(money>=FORBES[i].m){rank=i;break}}
  for(var i=FORBES.length-1;i>=0;i--){var f=FORBES[i];
    h+='<div class="fr'+(i===rank?' me':'')+'"><span class=rn>'+(i===FORBES.length-1?'🥇':'#'+(i+1))+'</span><span style=flex:1;font-size:15px>'+f.n+'</span><span style=font-size:14px;font-weight:600>'+F(f.m)+'💰</span></div>'}
  h+='</div></div>';return h
}

function HS(){
  return'<div class=card><h3>⚙️ Настройки</h3><div class=setr><span style=font-size:15px>⏱ Скорость игры</span><div class=hi><button class="'+(st===1?'on':'')+'" onclick="st=1;save();R()">×1</button><button class="'+(st===2?'on':'')+'" onclick="st=2;save();R()">×2</button><button class="'+(st===3?'on':'')+'" onclick="st=3;save();R()">×3</button></div></div><div class=setr><span style=font-size:15px>💾 Сохранение</span><button class="btn btn-p" onclick="save();toast(\'💾 Сохранено!\')" style=font-size:14px>💾 Сохранить</button></div><div class=setr><span style=font-size:15px>🔄 Новая игра</span><button class="btn btn-r" onclick="if(confirm(\'Начать заново? Вся прогрессия будет потеряна!\')){resetGame()}" style=font-size:15px>🗑 Сбросить</button></div></div>'
}
function resetGame(){clearTimeout(tmr);tmr=null;money=0;clickLv=0;hLv=-1;st=1;fused={};for(var i=0;i<B.length;i++){var b=B[i];bus[b.id]={lv:0,eq:[0,0]}}tab='click';try{localStorage.removeItem('bizSave')}catch(e){}R()}

load();R();start();
</script>
</body>
</html>
