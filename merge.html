<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Merge Drop — 2048</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--bg:#0d0b15;--card:#15121f;--text:#eeecf5;--dim:#6b6882;--gold:#f9bc60;--pink:#f2507a;--purple:#7c5cfc}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:-apple-system,'Segoe UI',sans-serif;color:var(--text)}
canvas{display:block;width:100%;height:100%;background:var(--bg)}

/* SCREENS */
.scr{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);padding:24px;transition:.3s}
.scr.h{opacity:0;pointer-events:none}
.scr .lg{font-size:72px;margin-bottom:6px;animation:fl 3s ease-in-out infinite}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.scr h1{font-size:34px;font-weight:900;background:linear-gradient(135deg,var(--gold),var(--pink),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.scr .tg{font-size:14px;color:var(--dim);margin:2px 0 18px}
.scr .hs{font-size:15px;color:var(--dim);background:var(--card);padding:8px 22px;border-radius:30px;margin-bottom:20px}
.scr .hs b{color:var(--gold)}
.b{padding:16px 0;border:none;border-radius:16px;font-size:17px;font-weight:700;cursor:pointer;margin:5px;width:260px;transition:.1s;touch-action:manipulation}
.b:active{transform:scale(0.94)}
.b-p{background:linear-gradient(135deg,var(--gold),var(--pink));color:#fff;box-shadow:0 6px 24px rgba(249,188,96,0.15)}
.b-s{background:var(--card);color:var(--text);border:1px solid rgba(255,255,255,0.04)}
.b-r{background:rgba(242,80,122,0.12);color:var(--pink);width:auto;padding:8px 16px;font-size:13px}

/* HUD */
#hud{position:fixed;top:0;left:0;right:0;padding:10px 14px;display:none;justify-content:space-between;align-items:center;z-index:5}
#hud.s{display:flex}
#hud .l{display:flex;align-items:center;gap:10px}
#hud .sc{font-size:15px;font-weight:700;color:var(--text);background:rgba(21,18,31,0.85);padding:7px 16px;border-radius:30px}
#hud .sc b{color:var(--gold)}
#hud .nx{font-size:13px;color:var(--dim);background:rgba(21,18,31,0.85);padding:7px 16px;border-radius:30px}
#hud .bk{width:38px;height:38px;border-radius:50%;border:none;background:rgba(21,18,31,0.85);color:var(--text);font-size:16px;cursor:pointer}

/* GAME OVER */
#ov{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,11,21,0.92);padding:24px}
#ov.s{display:flex}
#ov h2{font-size:36px;font-weight:900}
#ov .p{font-size:15px;color:var(--dim);margin:2px 0 2px}
#ov .fs{font-size:46px;font-weight:900;color:var(--gold);margin:4px 0 18px}

/* SETTINGS */
#set{position:fixed;inset:0;z-index:30;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(13,11,21,0.94);padding:24px}
#set.s{display:flex}
#set h2{font-size:22px;font-weight:800;margin-bottom:16px}
.rw{display:flex;justify-content:space-between;align-items:center;width:280px;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.03)}
.rw span{font-size:14px;color:var(--dim)}
.to{width:48px;height:26px;border-radius:13px;border:none;cursor:pointer;position:relative;background:rgba(255,255,255,0.06);transition:.2s}
.to::after{content:'';position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:var(--dim);transition:.2s}
.to.on{background:linear-gradient(135deg,var(--gold),var(--pink))}
.to.on::after{left:25px;background:#fff}
.grp{display:flex;gap:6px}
.grp button{width:38px;height:38px;border-radius:10px;border:2px solid rgba(255,255,255,0.06);background:transparent;color:var(--dim);font-size:14px;font-weight:700;cursor:pointer;transition:.15s}
.grp button.on{border-color:var(--gold);color:var(--gold);background:rgba(249,188,96,0.1)}

/* TOAST */
.ts{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:99;background:var(--card);padding:10px 22px;border-radius:14px;font-size:14px;font-weight:600;color:var(--text);border:1px solid rgba(255,255,255,0.04);box-shadow:0 6px 24px rgba(0,0,0,0.4);animation:ti .25s}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-16px)}}

/* RECORD */
.rec{color:var(--pink);font-size:15px;font-weight:600;margin-bottom:2px}
</style>
</head>
<body>
<canvas id=c></canvas>

<!-- MENU -->
<div class=scr id=menu>
  <div class=lg>🔢</div>
  <h1>Merge Drop</h1>
  <div class=tg>Достигни 2048 и выше</div>
  <div class=hs id=mHs>🏆 Рекорд: <b id=mHsB>0</b></div>
  <button class="b b-p" id=pb>🎮 Играть</button>
  <button class="b b-s" id=sb>⚙️ Настройки</button>
</div>

<!-- HUD -->
<div id=hud>
  <div class=l><button class=bk id=bb>✕</button>  <span class=sc>🎯 <b id=sC>0</b></span></div>
  <span class=nx id=nx>⬇ 2</span>
</div>

<!-- GAME OVER -->
<div id=ov>
  <h2>💀 Game Over</h2>
  <p class=p id=ovP>Твой счёт</p>
  <div class=rec id=ovR></div>
  <div class=fs id=ovS>0</div>
  <button class="b b-p" id=rb>🔄 Ещё раз</button>
  <button class="b b-s" id=mb>🏠 Меню</button>
</div>

<!-- SETTINGS -->
<div id=set>
  <h2>⚙️ Настройки</h2>
  <div class=rw><span>🎵 Звук</span><button class="to on" id=tgS></button></div>
  <div class=rw><span>📊 Колонки</span><div class=grp id=gsz><button data-n=6>6</button><button data-n=7 class=on>7</button><button data-n=8>8</button></div></div>
  <div class=rw><span>🏆 Рекорд</span><button class="b b-r" id=rst>Сбросить</button></div>
  <button class="b b-s" id=sb2 style=margin-top:18px>← Назад</button>
</div>

<script>
(function(){
var c=document.getElementById('c'),ctx=c.getContext('2d');
var W,H,CL=7,RR=12,SZ,gx,gy,gd=[],sc=0,hs=0,go=false,rdy=true;
var dc=-1,dv=0,dy=0,ds=0,nx=2,pl=false,snd=true;

var pal={
  2:{b:'#8bd3c7',t:'#0d0b15'},4:{b:'#f9bc60',t:'#0d0b15'},8:{b:'#f2507a',t:'#fff'},
  16:{b:'#e16162',t:'#fff'},32:{b:'#ff8ba7',t:'#0d0b15'},64:{b:'#f582ae',t:'#fff'},
  128:{b:'#ffc6c7',t:'#0d0b15'},256:{b:'#7c5cfc',t:'#fff'},512:{b:'#f9bc60',t:'#0d0b15'},
  1024:{b:'#f2507a',t:'#fff'},2048:{b:'#4ad0c4',t:'#0d0b15'},4096:{b:'#f9bc60',t:'#0d0b15'},
  8192:{b:'#7c5cfc',t:'#fff'}
};

function rs(){
  W=c.width=window.innerWidth;H=c.height=window.innerHeight;
  SZ=Math.max(20,Math.floor(Math.min((W-14)/CL,(H-120)/RR)));
  gx=(W-CL*SZ)/2;gy=H-RR*SZ-8;
  c.style.width=W+'px';c.style.height=H+'px';
}
window.addEventListener('resize',rs);

function ig(){gd=[];for(var r=0;r<RR;r++){gd[r]=[];for(var c=0;c<CL;c++)gd[r][c]=0}}

function fr(c){for(var r=RR-1;r>=0;r--)if(gd[r][c]===0)return r;return -1}

function drp(c){
  if(go||!rdy||c<0||c>=CL)return;
  if(fr(c)<0)return;
  dc=c;dv=Math.random()<0.7?2:4;dy=-SZ;ds=0;
  nx=Math.random()<0.7?2:4;document.getElementById('nx').textContent='⬇ '+nx;
  rdy=false;
}

function mg(r,c,v){
  if(r>0&&gd[r-1][c]===v){
    gd[r-1][c]=0;var n=v*2;sc+=n;
    document.getElementById('sC').textContent=sc;
    if(snd)plT(n);
    mg(r-1,c,n);
  }else{
    gd[r][c]=v;
    if(r===0){go=true;shOv()}
  }
}

function up(){
  if(go||dc<0)return;
  var tr=fr(dc);
  if(tr<0){dc=-1;rdy=true;return}
  var ty=gy+tr*SZ;
  ds+=0.35;dy+=ds;
  if(dy>=ty){
    dy=ty;
    if(tr>0&&gd[tr-1][dc]===dv){
      gd[tr-1][dc]=0;var n=dv*2;sc+=n;
      document.getElementById('sC').textContent=sc;
      if(snd)plT(n);
      mg(tr-1,dc,n);
    }else{
      gd[tr][dc]=dv;
      if(tr===0){go=true;shOv()}
    }
    dc=-1;rdy=true;
  }
}

function dr(){
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#0d0b15';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.02)';
  rr(ctx,gx-6,gy-6,CL*SZ+12,RR*SZ+12,12);ctx.fill();
  for(var r=0;r<RR;r++){for(var c=0;c<CL;c++){
    var x=gx+c*SZ+2,y=gy+r*SZ+2,s=SZ-4;
    ctx.fillStyle='rgba(255,255,255,0.03)';
    rr(ctx,x,y,s,s,6);ctx.fill();
    if(gd[r][c]){
      var v=gd[r][c],cl=pal[v]||pal[4];
      ctx.fillStyle=cl.b;rr(ctx,x+1,y+1,s-2,s-2,5);ctx.fill();
      ctx.fillStyle=cl.t;
      ctx.font='bold '+(SZ*0.3)+'px system-ui';
      ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(v,x+s/2,y+s/2+1);
    }
  }}
  if(dc>=0){
    var x=gx+dc*SZ+2,s=SZ-4,y=dy+2;
    if(y<gy-4)y=gy-4;
    var cl=pal[dv]||pal[4];
    ctx.fillStyle=cl.b;rr(ctx,x+1,y+1,s-2,s-2,5);ctx.fill();
    ctx.fillStyle=cl.t;
    ctx.font='bold '+(SZ*0.3)+'px system-ui';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(dv,x+s/2,y+s/2+1);
  }
  ctx.fillStyle='rgba(255,255,255,0.04)';ctx.font='12px system-ui';ctx.textAlign='center';
  ctx.fillText('🏆 '+(hs||'0'),W/2,gy+RR*SZ+18);
}

function rr(c,x,y,w,h,r){
  c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);
  c.quadraticCurveTo(x+w,y,x+w,y+r);c.lineTo(x+w,y+h-r);
  c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);c.lineTo(x+r,y+h);
  c.quadraticCurveTo(x,y+h,x,y+h-r);c.lineTo(x,y+r);
  c.quadraticCurveTo(x,y,x+r,y);c.closePath();
}

var ac=null;
function gA(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac}
function plT(v){
  try{
    var a=gA(),o=a.createOscillator(),g=a.createGain();
    o.type='sine';o.frequency.value=220+Math.log2(v)*40;
    g.gain.value=0.05;g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.12);
    o.connect(g);g.connect(a.destination);o.start();o.stop(a.currentTime+0.12);
  }catch(e){}
}

function shOv(){
  document.getElementById('ov').classList.add('s');
  document.getElementById('ovP').textContent='Твой счёт';
  document.getElementById('ovS').textContent=sc;
  document.getElementById('ovR').textContent='';
  var o=parseInt(localStorage.getItem('md_hs_'+CL)||'0');
  if(sc>o){localStorage.setItem('md_hs_'+CL,sc);hs=sc;document.getElementById('ovR').textContent='🏆 Новый рекорд!';document.getElementById('mHsB').textContent=hs}
  if(snd)plT(100);
}

function ts(t){
  var e=document.createElement('div');e.className='ts';e.textContent=t;
  document.body.appendChild(e);setTimeout(function(){e.remove()},1400);
}

function svO(){try{localStorage.setItem('md_o',JSON.stringify({s:snd,c:CL}))}catch(e){}}
function ldO(){try{var r=localStorage.getItem('md_o');if(r){var d=JSON.parse(r);if(d.s!==undefined)snd=d.s;if(d.c)CL=d.c}}catch(e){}}

function stG(){
  sc=0;go=false;rdy=true;dc=-1;ig();
  document.getElementById('sC').textContent='0';
  document.getElementById('ov').classList.remove('s');
  document.getElementById('hud').classList.add('s');
  document.getElementById('nx').textContent='⬇ 2';
  document.getElementById('menu').classList.add('h');
  pl=true;
}
function goM(){
  pl=false;go=true;dc=-1;
  document.getElementById('hud').classList.remove('s');
  document.getElementById('menu').classList.remove('h');
  document.getElementById('ov').classList.remove('s');
  document.getElementById('mHsB').textContent=hs||'0';
}

function lp(){
  if(pl){up();dr()}else{dr()}
  requestAnimationFrame(lp);
}

/* ─── BIND ─── */
function $(i){return document.getElementById(i)}
$('pb').addEventListener('click',function(){rs();stG()});
$('bb').addEventListener('click',goM);
$('mb').addEventListener('click',goM);
$('rb').addEventListener('click',function(){rs();stG()});
$('sb').addEventListener('click',function(){$('set').classList.add('s')});
$('sb2').addEventListener('click',function(){$('set').classList.remove('s');$('mHsB').textContent=hs||'0'});
$('tgS').addEventListener('click',function(){snd=!snd;if(snd)plT(500);this.classList.toggle('on');svO()});
var gb=document.querySelectorAll('#gsz button');
for(var i=0;i<gb.length;i++){gb[i].addEventListener('click',function(){
  var n=parseInt(this.getAttribute('data-n'));if(n===CL)return;
  CL=n;hs=parseInt(localStorage.getItem('md_hs_'+CL)||'0');
  for(var j=0;j<gb.length;j++)gb[j].classList.remove('on');
  this.classList.add('on');svO();
  ts('📊 Колонок: '+CL);rs();
  if(pl){stG()}$('mHsB').textContent=hs||'0';
})}
$('rst').addEventListener('click',function(){
  if(confirm('Сбросить рекорд?')){localStorage.removeItem('md_hs_'+CL);hs=0;$('mHsB').textContent='0';ts('💾 Рекорд сброшен')}
});
c.addEventListener('click',function(e){
  if(!pl||go||!rdy)return;
  var c=Math.floor((e.clientX-gx)/SZ);
  if(c<0)c=0;if(c>=CL)c=CL-1;drp(c);
});
c.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(!pl||go||!rdy)return;
  var t=e.touches[0],c=Math.floor((t.clientX-gx)/SZ);
  if(c<0)c=0;if(c>=CL)c=CL-1;drp(c);
},{passive:false});
document.addEventListener('keydown',function(e){
  if(!pl)return;
  var k=e.key;if(k>='1'&&k<='8'){var c=parseInt(k)-1;if(c<CL&&rdy)drp(c)}
});

/* ─── INIT ─── */
ldO();
hs=parseInt(localStorage.getItem('md_hs_'+CL)||'0');
document.getElementById('mHsB').textContent=hs||'0';
if(snd){document.getElementById('tgS').classList.add('on')}else{document.getElementById('tgS').classList.remove('on')}
for(var i=0;i<gb.length;i++){if(parseInt(gb[i].getAttribute('data-n'))===CL)gb[i].classList.add('on')}
rs();lp();
})();
</script>
</body>
</html>
